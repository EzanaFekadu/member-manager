# ---- HTTP
quarkus.http.port=8080

# ---- Qute
quarkus.qute.suffixes=html

# ---- SQLite
app.db.path=./data/app.db
quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.datasource.jdbc.url=jdbc:sqlite:${app.db.path}

# ---- Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# ---- Logging
quarkus.log.level=INFO

# ---- Admin seed (used only if users table empty; we’ll implement later)
app.seed-admin.enabled=true
app.seed-admin.email=${APP_ADMIN_EMAIL:}
app.seed-admin.password=${APP_ADMIN_PASSWORD:}